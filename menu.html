<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu - CampusFoodLink</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="menu">

  <header class="app-header">
    <div class="header-inner">
      <a href="vendors.html" class="back-link">&lt; Back</a>
      <h2 class="header-title" id="vendorName">Menu</h2>
      <a href="cart.html" class="header-icon" style="text-align:right" aria-label="Cart">&#128722;<span class="badge hidden" id="cartBadge">0</span></a>
    </div>
  </header>

  <main class="content">
    <div id="alert" class="alert hidden"></div>

    <div class="chips" style="margin-bottom:8px">
      <button class="chip active" data-tab="menuSection">Menu</button>
      <button class="chip" data-tab="infoSection">Info</button>
      <button class="chip" data-tab="hoursSection">Hours</button>
    </div>

    <section id="menuSection">
      <div class="chips" id="chips"></div>
      <div id="menuList"><p class="muted">Loading menu...</p></div>
      <a href="cart.html" class="btn btn-primary hidden" id="viewCartBtn"></a>
    </section>

    <section id="infoSection" class="hidden"></section>
    <section id="hoursSection" class="hidden"></section>
  </main>

  <nav class="bottom-nav" data-nav="student"></nav>

  <script src="js/env.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
