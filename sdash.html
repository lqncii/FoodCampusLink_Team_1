<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - CampusFoodLink</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="sdash">

  <header class="app-header">
    <div class="header-inner">
      <span class="header-icon">&#9776;</span>
      <h2 class="header-title">Dashboard</h2>
      <span class="header-icon">&#128276;</span>
    </div>
  </header>

  <main class="content">
    <div id="alert" class="alert hidden"></div>

    <section class="card accent">
      <p class="balance-label" id="greeting">Hi!</p>
      <h2 class="balance-amount" id="balance">$0.00</h2>
      <p class="balance-label">Meal Plan Balance</p>
    </section>

    <h3 class="section-title">Quick Actions</h3>
    <div class="grid-2">
      <a class="action-card" href="vendors.html"><span class="action-icon">&#127978;</span>Browse Vendors</a>
      <a class="action-card" href="orders.html"><span class="action-icon">&#128722;</span>My Orders</a>
      <a class="action-card" href="mealplan.html"><span class="action-icon">&#128179;</span>Meal Plan</a>
      <a class="action-card" href="orders.html#history"><span class="action-icon">&#128220;</span>History</a>
    </div>
  </main>

  <nav class="bottom-nav" data-nav="student" data-active="Home"></nav>

  <script src="js/env.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
