<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Plan - CampusFoodLink</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="mealplan">

  <header class="app-header">
    <div class="header-inner">
      <a href="sdash.html" class="back-link">&lt; Back</a>
      <h2 class="header-title">Meal Plan</h2>
      <span class="header-icon"></span>
    </div>
  </header>

  <main class="content">
    <div id="alert" class="alert hidden"></div>

    <section class="card accent">
      <p class="balance-label">Current Balance</p>
      <h2 class="balance-amount" id="balance">$0.00</h2>
      <p class="balance-label" id="lastUpdated"></p>
    </section>

    <div class="chips">
      <button class="chip active" data-tab="activitySection">Activity</button>
      <button class="chip" data-tab="detailsSection">Details</button>
    </div>

    <section id="activitySection">
      <div id="activityList"><p class="muted">Loading activity...</p></div>
      <a href="orders.html#history" class="btn btn-primary" style="margin-top:8px">VIEW FULL HISTORY</a>
    </section>

    <section id="detailsSection" class="hidden"></section>
  </main>

  <nav class="bottom-nav" data-nav="student" data-active="Wallet"></nav>

  <script src="js/env.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
