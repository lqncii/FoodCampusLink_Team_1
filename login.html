<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - CampusFoodLink</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="login" class="no-nav">

  <header class="app-header">
    <div class="header-inner">
      <a href="index.html" class="back-link">&lt; Back</a>
      <h2 class="header-title">Log In</h2>
      <span class="header-icon"></span>
    </div>
  </header>

  <main class="content">
    <div id="alert" class="alert hidden"></div>

    <p class="muted" style="margin-top:0">I am logging in as:</p>

    <div class="role-card" data-role="student">
      <span class="role-icon">&#127891;</span>
      <h3>STUDENT</h3>
      <span class="chev">&#8250;</span>
    </div>
    <div class="role-card" data-role="vendor">
      <span class="role-icon">&#127978;</span>
      <h3>VENDOR</h3>
      <span class="chev">&#8250;</span>
    </div>
    <div class="role-card" data-role="admin">
      <span class="role-icon">&#128737;&#65039;</span>
      <h3>ADMIN</h3>
      <span class="chev">&#8250;</span>
    </div>

    <form id="loginForm" class="card hidden" novalidate>
      <h3 style="margin-top:0">Log in as <span id="roleLabel"></span></h3>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <div class="field hidden" id="vendorField">
        <label for="vendorSelect">Vendor location</label>
        <select id="vendorSelect">
          <option value="">Select your vendor...</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">LOG IN</button>
    </form>

    <p class="muted center">Demo / Simulated Access Only.<br>No real payments or FERPA data stored.</p>
  </main>

  <script src="js/env.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
