<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation • Campus FoodLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="header">
            <a href="cart.html" class="back-btn">&larr;</a>
            <span>Order Confirmation</span>
        </div>

        <!-- Order Placed! Logo-->
        <div class="p-6 text-center" style="padding-top: 60px;">
            <div style="width: 100px; height: 100px; background-color: #22c55e; border-radius: 9999px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-size: 50px;">
                ✓
            </div>
            
            <h2 style="font-size: 28px; margin-bottom: 8px;">Order Placed!</h2>
            <p style="color: #a1a1aa; margin-bottom: 40px;">Order #A12345</p>
            <!--END of Order Place! logo-->
            
            <!-- Pickup Information: pickup location & est. ready time-->
            <div style="background-color: #012449; border-radius: 16px; padding: 20px; text-align: left; margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                    <div>Pickup At</div>
                    <div style="text-align: right;">The Campus Café</div>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <div>Est. Ready Time</div>
                    <div style="text-align: right;">12:25 PM</div>
                </div>
            </div>

            <!-- Order Summary -->
            <div style="background-color: #012449; border-radius: 16px; padding: 16px; text-align: left;">
                <div style="display: flex; justify-content: space-between;">
                    <span>Order Summary</span>
                    <span>3 items • $13.97</span>
                </div>
            </div>

            <!-- View Order Status Button -->
            <a href="order-status.html" style="text-decoration: none;">
                <button class="btn btn-primary" style="margin-top: 40px; padding: 18px;">
                    VIEW ORDER STATUS
                </button>
            </a>
        </div>
    </div>
</body>
</html>
