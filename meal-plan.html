<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Plan • Campus FoodLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <a href="student-dashboard.html" class="back-btn"><img src="back_button.png" alt="Back" class="back-btn"></a>
            <span>Meal Plan</span>
        </div>

        <div class="p-6">
            <!--Meal Plan Current Balance-->
            <div style="background-color: #012449; border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 24px;">
                <p style="color: #a1a1aa;">Current Balance</p>
                <p style="font-size: 42px; font-weight: 700; color: #da1143;">$125.50</p>
                <p style="font-size: 14px; color: #22c55e;">Last Updated: May 12, 2026 10:30 AM</p>
            </div>

            <!--Activity-->
            <h3 style="margin-bottom: 16px;">Activity</h3>
            
            <div style="background-color: #012449; border-radius: 16px; padding: 16px;">
                <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #27272a;">
                    <div>
                        <p>The Campus Café</p>
                        <p style="font-size: 13px; color: #a1a1aa;">May 12</p>
                    </div>
                    <p style="color: #da1143;">-$13.97</p>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #27272a;">
                    <div>
                        <p>Panda Express</p>
                        <p style="font-size: 13px; color: #a1a1aa;">May 11</p>
                    </div>
                    <p style="color: #da1143;">-$9.45</p>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 12px 0;">
                    <div>
                        <p>Fresh & Fit</p>
                        <p style="font-size: 13px; color: #a1a1aa;">May 10</p>
                    </div>
                    <p style="color: #da1143;">-$7.50</p>
                </div>
            </div>

            <!--View Full History Button-->
            <a href="#" style="text-decoration: none;">
                <button class="btn btn-primary" style="margin-top: 32px;">
                    VIEW FULL HISTORY
                </button>
            </a>
        </div>
    </div>
</body>
</html>
