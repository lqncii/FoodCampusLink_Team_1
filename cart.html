<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart • Campus FoodLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <a href="vendor-menu.html" class="back-btn">&larr;</a>
            <span>Your Cart</span>
        </div>

        <div class="p-6">
            <!-- Cart Items -->
            <div style="background-color: #111113; border-radius: 16px; padding: 16px; margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #27272a;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <div style="width: 40px; height: 40px; background: #ef233c; border-radius: 8px;"><img src="placer.png" alt="image" width="40" height="40"></div>
                        <div>
                            <p>Breakfast Burrito</p>
                            <p style="font-size: 13px; color: #a1a1aa;">Eggs, cheese, sausage...</p>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <p style="font-weight: 600;">$4.99</p>
                        <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
                            <button style="width: 28px; height: 28px; border-radius: 50%; background: #27272a; color: white;">–</button>
                            <span style="width: 24px; text-align: center;">1</span>
                            <button style="width: 28px; height: 28px; border-radius: 50%; background: #ef233c; color: white;">+</button>
                        </div>
                    </div>
                </div>

                <!-- More items (simplified) -->
                <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #27272a;">
                    <div>Iced Coffee</div>
                    <div>$2.49</div>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 12px 0;">
                    <div>Grilled Chicken Sandwich</div>
                    <div>$6.49</div>
                </div>
            </div>

            <!-- Special Instructions -->
            <p style="margin-bottom: 8px; font-size: 14px;">Special Instructions (Optional)</p>
            <textarea placeholder="Write a note..." style="width: 100%; height: 80px; background: #111113; border: 1px solid #27272a; border-radius: 12px; color: white; padding: 12px;"></textarea>

            <!-- Total -->
            <div style="display: flex; justify-content: space-between; margin: 24px 0; font-size: 18px; font-weight: 600;">
                <span>Total</span>
                <span>$13.97</span>
            </div>

            <!-- Place Order -->
            <a href="order-confirmation.html">
                <button class="btn btn-primary" style="padding: 18px; font-size: 18px;">
                    PLACE ORDER
                </button>
            </a>
        </div>
    </div>
</body>
</html>
