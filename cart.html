<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - CampusFoodLink</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="cart">

  <header class="app-header">
    <div class="header-inner">
      <a href="#" class="back-link" data-action="back" data-fallback="vendors.html">&lt; Back</a>
      <h2 class="header-title">Your Cart</h2>
      <span class="header-icon"></span>
    </div>
  </header>

  <main class="content">
    <div id="alert" class="alert hidden"></div>

    <div id="cartList"></div>

    <div class="field" style="margin-top:18px">
      <label for="notes">Special Instructions (Optional)</label>
      <textarea id="notes" placeholder="Write a note..."></textarea>
    </div>

    <div class="kv" style="font-size:1rem; padding:12px 0">
      <span><strong>Total</strong></span>
      <span id="cartTotal">$0.00</span>
    </div>

    <button class="btn btn-primary" id="placeOrderBtn" disabled>PLACE ORDER</button>
  </main>

  <nav class="bottom-nav" data-nav="student"></nav>

  <script src="js/env.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
