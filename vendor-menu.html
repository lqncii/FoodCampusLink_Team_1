<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Campus Café • Campus FoodLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <a href="browse-vendors.html" class="back-btn">&larr;</a>
            <span style="flex: 1; text-align: center;">The Campus Café</span>
            <a href="#" style="font-size: 24px;">🛒</a>
        </div>

        <div class="p-6">
            <!-- Tabs -->
            <div style="display: flex; background-color: #111113; border-radius: 9999px; padding: 4px; margin-bottom: 24px;">
                <div style="flex: 1; text-align: center; padding: 10px; background-color: #ef233c; border-radius: 9999px; font-weight: 600;">Menu</div>
                <div style="flex: 1; text-align: center; padding: 10px; color: #a1a1aa;">Info</div>
                <div style="flex: 1; text-align: center; padding: 10px; color: #a1a1aa;">Hours</div>
            </div>

            <!-- Menu Items -->
            <div style="margin-bottom: 16px;">
                <div style="display: flex; justify-content: space-between; align-items: center; background-color: #111113; border-radius: 16px; padding: 16px; margin-bottom: 12px;">
                    <div style="flex: 1;">
                        <p style="font-weight: 600;">Breakfast Burrito</p>
                        <p style="font-size: 14px; color: #a1a1aa;">Eggs, cheese, sausage, potatoes</p>
                    </div>
                    <div style="text-align: right;">
                        <p style="font-weight: 600;">$4.99</p>
                        <button style="background-color: #ef233c; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 18px; line-height: 20px;">+</button>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; background-color: #111113; border-radius: 16px; padding: 16px; margin-bottom: 12px;">
                    <div style="flex: 1;">
                        <p style="font-weight: 600;">Grilled Chicken Sandwich</p>
                        <p style="font-size: 14px; color: #a1a1aa;">Chicken, lettuce, tomato, mayo</p>
                    </div>
                    <div style="text-align: right;">
                        <p style="font-weight: 600;">$6.49</p>
                        <button style="background-color: #ef233c; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 18px; line-height: 20px;">+</button>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; background-color: #111113; border-radius: 16px; padding: 16px; margin-bottom: 12px;">
                    <div style="flex: 1;">
                        <p style="font-weight: 600;">Caesar Salad</p>
                        <p style="font-size: 14px; color: #a1a1aa;">Romaine, croutons, parmesan, caesar dressing</p>
                    </div>
                    <div style="text-align: right;">
                        <p style="font-weight: 600;">$5.49</p>
                        <button style="background-color: #ef233c; color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 18px; line-height: 20px;">+</button>
                    </div>
                </div>
            </div>

            <!-- View Cart Button -->
            <a href="cart.html" style="text-decoration: none;">
                <button class="btn btn-primary" style="margin-top: 20px;">
                    VIEW CART (2) — $11.48
                </button>
            </a>
        </div>
    </div>
</body>
</html>
