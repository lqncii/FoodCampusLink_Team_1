<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status • Campus FoodLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="header">
            <a href="order-confirmation.html" class="back-btn">&larr;</a>
            <span>Order Status</span>
        </div>

        <div class="p-6">
            <p style="text-align: center; margin-bottom: 8px;">Order #A12345</p>

            <!-- Progress -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 32px 0; position: relative;">
                <div style="text-align: center; z-index: 2;">
                    <div style="width: 50px; height: 50px; background: #22c55e; border-radius: 9999px; margin: 0 auto; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;">✓</div>
                    <p style="font-size: 12px; margin-top: 8px;">Pending</p>
                </div>
                <div style="text-align: center; z-index: 2;">
                    <div style="width: 50px; height: 50px; background: #ef233c; border-radius: 9999px; margin: 0 auto; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;">👨‍🍳</div>
                    <p style="font-size: 12px; margin-top: 8px;">Preparing</p>
                </div>
                <div style="text-align: center; z-index: 2;">
                    <div style="width: 50px; height: 50px; background: #111113; border: 3px solid #52525b; border-radius: 9999px; margin: 0 auto;"></div>
                    <p style="font-size: 12px; margin-top: 8px;">Ready</p>
                </div>
                <div style="text-align: center; z-index: 2;">
                    <div style="width: 50px; height: 50px; background: #111113; border: 3px solid #52525b; border-radius: 9999px; margin: 0 auto;"></div>
                    <p style="font-size: 12px; margin-top: 8px;">Complete</p>
                </div>
            </div>

            <div style="background-color: #111113; border-radius: 16px; padding: 24px; text-align: center;">
                <p style="font-size: 32px; font-weight: 700; margin-bottom: 8px;">12:25 PM</p>
                <p>Estimated Ready Time</p>
            </div>

            <div style="background-color: #111113; border-radius: 16px; padding: 20px; margin-top: 24px; text-align: center;">
                <span style="font-size: 28px;">🛎️</span>
                <p style="margin-top: 12px;">We'll notify you when<br>your order is ready!</p>
            </div>
        </div>
    </div>
</body>
</html>
