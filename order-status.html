<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Status • Campus FoodLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="header">
            <a href="order-confirmation.html" class="back-btn"><img src="back_button.png" alt="Back" class="back-btn"></a>
            <span>Order Status</span>
        </div>

        <div class="p-6">
            <p style="text-align: center; margin-bottom: 8px;">Order #A12345</p>

            <!-- Progress -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 32px 0; position: relative;">
                <div style="text-align: center; z-index: 2;">
                    <img src="checkmark.png" alt="checkmark" class="pending-image">
                    <p style="font-size: 12px; margin-top: 8px;">Pending</p>
                </div>
                <div style="text-align: center; z-index: 2;">
                    <img src="preparing.png" alt="Preparing" class="pending-image">
                    <p style="font-size: 12px; margin-top: 8px;">Preparing</p>
                </div>
                <div style="text-align: center; z-index: 2;">
                    <img src="clock.png" alt="Clock" class="pending-image">
                    <p style="font-size: 12px; margin-top: 8px;">Ready</p>
                </div>
                <div style="text-align: center; z-index: 2;">
                    <img src="complete.png" alt="Complete" class="pending-image">
                    <p style="font-size: 12px; margin-top: 8px;">Complete</p>
                </div>
            </div>

            <!--Estimated waiting time-->
            <div style="background-color: #012449; border-radius: 16px; padding: 24px; text-align: center;">
                <p style="font-size: 32px; font-weight: 700; margin-bottom: 8px;">12:25 PM</p>
                <p>Estimated Ready Time</p>
            </div>

            <!--Notification Reminder-->
            <div style="background-color: #012449; border-radius: 16px; padding: 20px; margin-top: 24px; text-align: center;">
                <span style="font-size: 28px;"><img src="bell.PNG" alt="bell icon" class="pending-image"></span>
                <p style="margin-top: 12px;">We'll notify you when<br>your order is ready!</p>
            </div>
            
        </div> <!--END of div class p-6-->
    </div>
</body>
</html>
