<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - CampusFoodLink</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="adash" class="no-nav">

  <header class="app-header">
    <div class="header-inner">
      <span class="header-icon">&#128737;&#65039;</span>
      <h2 class="header-title">Dining Services Admin</h2>
      <a href="#" class="header-icon" id="adminLogout" style="font-size:0.75rem; font-weight:600">LOG OUT</a>
    </div>
  </header>

  <main class="content">
    <div id="alert" class="alert hidden"></div>

    <section class="card accent">
      <p class="balance-label" id="greeting">Hi!</p>
      <div class="kv" style="color:#fff"><span>Student accounts</span><span id="studentCount">0</span></div>
      <div class="kv" style="color:#fff"><span>Total meal plan funds</span><span id="totalBalance">$0.00</span></div>
    </section>

    <h3 class="section-title">Manage Meal Plan Balances</h3>
    <div id="studentList"><p class="muted">Loading students...</p></div>
  </main>

  <script src="js/env.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
