<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Ready • Campus FoodLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="header">
            <a href="order-status.html" class="back-btn">&larr;</a>
            <span>Order Ready</span>
        </div>

        <div class="p-6 text-center" style="padding-top: 80px;">
            <img src="order_ready.png" alt="Order Ready" class="pending-image">
            </div>
            
            <h2 style="font-size: 28px; margin-bottom: 12px;">Your order is ready!</h2>
            <p style="color: #a1a1aa; margin-bottom: 32px;">Order #A12345</p>

            <div style="background-color: #111113; border-radius: 16px; padding: 24px; margin-bottom: 40px;">
                <p style="font-weight: 600;">The Campus Café</p>
                <p>Please pick it up at the vendor counter.</p>
            </div>

            <button class="btn btn-primary" onclick="alert('Thank you for using Campus FoodLink!')">
                GOT IT
            </button>
        </div>
    </div>
</body>
</html>
