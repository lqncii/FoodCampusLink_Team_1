<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Dashboard - CampusFoodLink</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="vdash">

  <header class="app-header">
    <div class="header-inner">
      <span class="header-icon">&#9776;</span>
      <h2 class="header-title">Vendor Dashboard</h2>
      <span class="header-icon">&#128276;</span>
    </div>
  </header>

  <main class="content">
    <div id="alert" class="alert hidden"></div>

    <section class="card accent">
      <p class="balance-label" id="greeting">Hi!</p>
      <p class="balance-label" style="font-weight:600" id="vendorName"></p>
      <a href="vmenu.html" class="btn btn-invert" style="margin-top:12px">VIEW MENU</a>
    </section>

    <h3 class="section-title">Today's Orders</h3>
    <div id="todayOrders"><p class="muted">Loading orders...</p></div>

    <h3 class="section-title">Quick Actions</h3>
    <div class="grid-2">
      <a class="action-card" href="vorders.html"><span class="action-icon">&#127869;&#65039;</span>Orders</a>
      <a class="action-card" href="vmenu.html"><span class="action-icon">&#128220;</span>Menu</a>
      <a class="action-card" href="vhours.html"><span class="action-icon">&#128337;</span>Hours</a>
      <a class="action-card" href="vreports.html"><span class="action-icon">&#128202;</span>Reports</a>
    </div>
  </main>

  <nav class="bottom-nav" data-nav="vendor" data-active="Home"></nav>

  <script src="js/env.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/vendor.js"></script>
</body>
</html>
