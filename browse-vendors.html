<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Vendors • Campus FoodLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <a href="student-dashboard.html" class="back-btn">&larr;</a>
            <span style="flex: 1; text-align: center;">Vendors</span>
            <button class="back-btn" style="font-size: 24px;"><img src="search-bar.png" alt="search bar" width="24" height="24"></button>
        </div>

        <div class="p-6">
            <!-- Search Bar -->
            <div style="background-color: #111113; border-radius: 12px; padding: 12px 16px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 20px;"><img src="search-bar.png" alt="search bar" width="24" height="24"></span>
                <input type="text" placeholder="Search vendors..." 
                       style="background: none; border: none; outline: none; color: white; width: 100%; font-size: 16px;">
            </div>

            <!-- Vendors List -->
            <div onclick="goToVendorMenu()" style="cursor: pointer;">
                <div style="display: flex; gap: 16px; background-color: #111113; border-radius: 16px; padding: 16px; margin-bottom: 12px;">
                    <div style="width: 70px; height: 70px; background-color: #ef233c; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 32px;"><img src="placer.png" alt="image" width="75" height="75"></div>
                    <div style="flex: 1;">
                        <h3 style="font-weight: 600;">The Campus Café</h3>
                        <p style="color: #a1a1aa; font-size: 14px;">Coffee • Sandwiches • Salads</p>
                        <p style="color: #22c55e; font-size: 13px; margin-top: 4px;">10–15 min</p>
                    </div>
                    <div style="align-self: center; font-size: 24px; color: #52525b;">›</div>
                </div>
            </div>

            <!-- More placeholder vendors -->
            <div style="display: flex; gap: 16px; background-color: #111113; border-radius: 16px; padding: 16px; margin-bottom: 12px; opacity: 0.7;">
                <div style="width: 70px; height: 70px; background-color: #ef233c; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 32px;"><img src="placer.png" alt="image" width="75" height="75"></div>
                <div style="flex: 1;">
                    <h3 style="font-weight: 600;">Panda Express</h3>
                    <p style="color: #a1a1aa; font-size: 14px;">Asian • Bowls • Entrees</p>
                    <p style="color: #22c55e; font-size: 13px; margin-top: 4px;">15–20 min</p>
                </div>
                <div style="align-self: center; font-size: 24px; color: #52525b;">›</div>
            </div>

            <div style="display: flex; gap: 16px; background-color: #111113; border-radius: 16px; padding: 16px; margin-bottom: 12px; opacity: 0.7;">
                <div style="width: 70px; height: 70px; background-color: #ef233c; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 32px;"><img src="placer.png" alt="image" width="75" height="75"></div>
                <div style="flex: 1;">
                    <h3 style="font-weight: 600;">Fresh & Fit</h3>
                    <p style="color: #a1a1aa; font-size: 14px;">Salads • Wraps • Smoothies</p>
                    <p style="color: #22c55e; font-size: 13px; margin-top: 4px;">5–10 min</p>
                </div>
                <div style="align-self: center; font-size: 24px; color: #52525b;">›</div>
            </div>
        </div>
    </div>

    <script>
        function goToVendorMenu() {
            window.location.href = "vendor-menu.html";
        }
    </script>
</body>
</html>
