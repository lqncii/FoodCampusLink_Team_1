<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu - CampusFoodLink Vendor</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="vmenu">

  <header class="app-header">
    <div class="header-inner">
      <a href="vdash.html" class="back-link">&lt; Back</a>
      <h2 class="header-title">Update Menu</h2>
      <span class="header-icon"></span>
    </div>
  </header>

  <main class="content">
    <div id="alert" class="alert hidden"></div>

    <form id="addItemForm" class="card">
      <h3 style="margin-top:0">Add Item</h3>
      <div class="field"><label>Name</label><input name="item_name" required></div>
      <div class="field"><label>Description</label><input name="item_description"></div>
      <div class="field"><label>Price</label><input name="item_price" type="number" step="0.01" min="0" required></div>
      <div class="field"><label>Category (optional, e.g. Breakfast, Lunch, Drinks)</label><input name="category"></div>
      <button type="submit" class="btn btn-primary">ADD ITEM</button>
    </form>

    <h3 class="section-title">Current Menu</h3>
    <div id="menuItems"><p class="muted">Loading menu...</p></div>
  </main>

  <nav class="bottom-nav" data-nav="vendor" data-active="Menu"></nav>

  <script src="js/env.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/vendor.js"></script>
</body>
</html>
