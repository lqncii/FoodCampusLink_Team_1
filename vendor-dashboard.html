<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard • Campus FoodLink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- Header -->
        <div class="header">
            <img src="option_lines.PNG" alt="Option icon" class="pending-image">
            <span style="flex: 1; text-align: center;">Vendor Dashboard</span>
            <button class="back-btn" style="font-size: 24px;"> <img src="bell.PNG" alt="bell icon" class="pending-image"></button>
        </div>

        <div class="p-6">
            <div style="background-color: #012449; border-radius: 16px; padding: 20px; margin-bottom: 24px;">
                <p>Hi, Vendor User!</p>
                <p style="font-size: 20px; font-weight: 600;">The Campus Café</p>
                <button class="btn btn-primary" style="margin-top: 12px; padding: 12px 24px; width: auto;">
                    VIEW MENU
                </button>
            </div>

            <h3 style="margin-bottom: 16px;">Today's Orders</h3>
            
            <div style="background-color: #012449; border-radius: 16px; padding: 16px;">
                <p style="font-weight: 600; color: #da1143;">#A12345 • 12:25 PM • Preparing</p>
                <p style="font-weight: 600; color: #da1143; margin-top: 12px;">#A12346 • 12:40 PM • Pending</p>
                <p style="font-weight: 600; color: #da1143; margin-top: 12px;">#A12347 • 12:50 PM • Pending</p>
            </div>

            <!-- Quick Actions -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 32px;">
                <div class="quick-action">Orders</div>
                <div class="quick-action">Menu</div>
                <div class="quick-action">Hours</div>
                <div class="quick-action">Reports</div>
            </div>
        </div>
    </div>
</body>
</html>
